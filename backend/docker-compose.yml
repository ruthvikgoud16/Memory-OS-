version: '3.8'

services:
  valkey:
    image: valkey/valkey:latest
    container_name: memoryos_valkey
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: .
    container_name: memoryos_backend
    ports:
      - "8000:8000"
    environment:
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    depends_on:
      - valkey
    restart: always
